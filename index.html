<!-- Live Weather Integration -->
<section class="px-margin-mobile max-w-2xl mx-auto mb-xl">
  <div class="glass-card rounded-xl p-md shadow-[0px_10px_30px_rgba(0,0,0,0.04)]">
    <h3 class="font-headline-md text-headline-md text-on-surface">Live Weather (Berlin)</h3>
    <div id="current" class="mt-md">
      <div class="flex items-baseline justify-between">
        <div>
          <div id="current-temp" class="font-display-temp text-display-temp text-primary">--°</div>
          <div id="current-desc" class="text-body-md text-on-surface-variant">--</div>
        </div>
        <div class="text-right">
          <div id="current-wind" class="text-body-md text-on-surface-variant">Wind: -- m/s</div>
          <div id="current-time" class="text-label-sm text-on-surface-variant">--</div>
        </div>
      </div>
    </div>
    <div id="hourly" class="mt-md overflow-auto">
      <table class="w-full text-left text-sm">
        <thead>
          <tr>
            <th class="py-2">Time</th>
            <th class="py-2">Temp (°C)</th>
            <th class="py-2">Wind (m/s)</th>
            <th class="py-2">RH (%)</th>
          </tr>
        </thead>
        <tbody id="hourly-body"></tbody>
      </table>
    </div>
  </div>
</section>

<script>
// Open-Meteo API URL (Berlin coordinates as in example)
const API_URL = 'https://api.open-meteo.com/v1/forecast?latitude=52.52&longitude=13.41&current=temperature_2m,wind_speed_10m&hourly=temperature_2m,relative_humidity_2m,wind_speed_10m&timezone=auto';

async function loadWeather() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error('Network response was not ok');
    const data = await res.json();

    // Current weather (API may include `current` or `current_weather`)
    const current = data.current || data.current_weather || {};
    const currentTemp = current.temperature_2m ?? current.temperature ?? '--';
    const currentWind = current.wind_speed_10m ?? current.windspeed ?? '--';
    const currentTime = current.time ?? '--';

    document.getElementById('current-temp').textContent = (currentTemp === '--' ? '--' : Number(currentTemp).toFixed(1)) + '°';
    document.getElementById('current-wind').textContent = 'Wind: ' + (currentWind === '--' ? '--' : Number(currentWind).toFixed(1)) + ' m/s';
    document.getElementById('current-time').textContent = currentTime;

    // Hourly data
    const hourly = data.hourly || {};
    const times = hourly.time || [];
    const temps = hourly.temperature_2m || [];
    const winds = hourly.wind_speed_10m || [];
    const rh = hourly.relative_humidity_2m || [];

    const tbody = document.getElementById('hourly-body');
    tbody.innerHTML = '';

    // Render first 24 hourly entries (or all if shorter)
    const count = Math.min(24, times.length);
    for (let i = 0; i < count; i++) {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="py-2">${times[i] ?? '--'}</td>
        <td class="py-2">${temps[i] !== undefined ? Number(temps[i]).toFixed(1) : '--'}</td>
        <td class="py-2">${winds[i] !== undefined ? Number(winds[i]).toFixed(1) : '--'}</td>
        <td class="py-2">${rh[i] !== undefined ? Number(rh[i]).toFixed(0) : '--'}</td>
      `;
      tbody.appendChild(tr);
    }
  } catch (err) {
    console.error('Failed loading weather', err);
    document.getElementById('current-desc').textContent = 'Failed to load weather data';
  }
}

// Load on start
loadWeather();
</script>
<script>
// Search filtering and navigation to city page
document.addEventListener('DOMContentLoaded', () => {
  const search = document.getElementById('city-search');
  if (search) {
    search.addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase().trim();
      document.querySelectorAll('.city-card').forEach(card => {
        const name = (card.dataset.name || '').toLowerCase();
        card.style.display = name.includes(q) ? '' : 'none';
      });
    });
  }

  // Click a city card to open cityweather.html with coords
  document.querySelectorAll('.city-card').forEach(card => {
    card.addEventListener('click', () => {
      const name = encodeURIComponent(card.dataset.name || '');
      const lat = card.dataset.lat;
      const lon = card.dataset.lon;
      if (lat && lon) {
        window.location.href = `cityweather.html?city=${name}&lat=${lat}&lon=${lon}`;
      }
    });
  });
});
</script>
